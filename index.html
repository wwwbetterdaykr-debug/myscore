<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>나의 성생활 능력치?</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');

:root{
--bg:#F5F1EB;--card:#FFFDF9;--tx:#2C2925;--tx2:#6B6560;--tx3:#8A847A;
--accent:#C8102E;--line:#E8E2D8;
--red:#C8102E;--blue:#2563EB;--green:#16A34A;--purple:#9333EA;--amber:#D97706;--pink:#EC4899;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;overflow-x:hidden}
section{display:none;min-height:100dvh}
section.active{display:flex;flex-direction:column}

#intro{justify-content:center;align-items:center;padding:24px;text-align:center}
.intro-eyebrow{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.04em;margin-bottom:8px}
.intro-title{font-family:'Noto Serif KR',serif;font-weight:900;font-size:32px;line-height:1.3;letter-spacing:-.04em;margin-bottom:12px}
.intro-sub{font-size:15px;color:var(--tx2);line-height:1.6;margin-bottom:28px}
.trust-bar{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.trust-dot{font-size:11px;font-weight:600;color:var(--tx3);background:var(--card);border:1px solid var(--line);border-radius:20px;padding:4px 10px}
.social-proof{display:flex;justify-content:center;gap:18px;margin-bottom:18px}
.sp-item{text-align:center}
.sp-num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:var(--tx)}
.sp-label{font-size:11px;color:var(--tx3);margin-top:2px}
.intro-ref{font-size:11px;color:var(--tx3);line-height:1.5;margin-bottom:24px;padding:0 12px}
.provoke-box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:32px;max-width:320px;width:100%}
.provoke-q{font-weight:800;font-size:15px;margin-bottom:12px}
.provoke-row{display:flex;justify-content:center;gap:24px;margin-bottom:6px}
.provoke-pct{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px}
.provoke-pct.red{color:var(--red)}
.provoke-pct.blue{color:var(--blue)}
.provoke-label{font-size:12px;color:var(--tx3)}
.provoke-note{font-size:11px;color:var(--tx3)}
.btn-start{width:100%;max-width:320px;padding:18px;border:none;border-radius:16px;background:var(--accent);color:#fff;font-size:17px;font-weight:800;cursor:pointer;letter-spacing:-.03em;transition:transform .15s}
.btn-start:active{transform:scale(.96)}

#profile{justify-content:center;align-items:center;padding:24px}
.profile-wrap{width:100%;max-width:360px}
.profile-wrap h2{font-family:'Noto Serif KR',serif;font-weight:900;font-size:24px;text-align:center;margin-bottom:32px;letter-spacing:-.04em}
.gender-row{display:flex;gap:12px;margin-bottom:24px}
.g-btn{flex:1;padding:18px;border:2px solid var(--line);border-radius:16px;background:var(--card);font-size:16px;font-weight:700;cursor:pointer;transition:border-color .2s,background .2s;text-align:center}
.g-btn.sel{border-color:var(--accent);background:#FFF5F5}
.age-group label{display:block;font-size:14px;font-weight:700;margin-bottom:8px}
.age-group select{width:100%;padding:16px;border:2px solid var(--line);border-radius:14px;background:var(--card);font-size:15px;font-family:inherit;appearance:none;-webkit-appearance:none}
.btn-next{width:100%;padding:18px;border:none;border-radius:16px;background:var(--accent);color:#fff;font-size:17px;font-weight:800;margin-top:32px;cursor:pointer;letter-spacing:-.03em;transition:transform .15s}
.btn-next:active{transform:scale(.96)}

#quiz{padding:24px;align-items:center}
.quiz-wrap{width:100%;max-width:400px;flex:1;display:flex;flex-direction:column}
.q-progress{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.q-bar-bg{flex:1;height:6px;background:var(--line);border-radius:3px}
.q-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.q-num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:var(--tx3);min-width:42px;text-align:right}
.q-body{flex:1;display:flex;justify-content:center;align-items:center;text-align:center;padding:20px 0}
.q-body p{font-weight:800;font-size:26px;line-height:1.45;letter-spacing:-.04em}
.opts{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.opt-btn{padding:16px;border:2px solid var(--line);border-radius:14px;background:var(--card);font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:border-color .2s,background .2s}
.opt-btn.sel{border-color:var(--accent);background:#FFF5F5;color:var(--accent)}
.nav-row{display:flex;gap:10px;margin-top:auto;padding-bottom:12px}
.nav-btn{flex:1;padding:14px;border:2px solid var(--line);border-radius:14px;background:var(--card);font-size:15px;font-weight:700;cursor:pointer;text-align:center;transition:border-color .2s,background .2s,opacity .2s}
.nav-btn:disabled{opacity:.35;cursor:default}
.nav-btn.primary{border-color:var(--accent);background:var(--accent);color:#fff}

#loading{justify-content:center;align-items:center;text-align:center;padding:24px}
.ld-title{font-family:'Noto Serif KR',serif;font-weight:900;font-size:22px;margin-bottom:16px}
.ld-bar-bg{width:200px;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.ld-bar{height:100%;width:0;background:var(--accent);border-radius:3px;transition:width .3s}
.ld-pct{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:var(--tx3);margin-top:8px}

#result{padding:0 0 60px}
.r-hero{text-align:center;padding:48px 24px 32px;background:linear-gradient(180deg,#FFFDF9 0%,var(--bg) 100%)}
.r-tier{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.04em;margin-bottom:4px}
.r-name{font-family:'Noto Serif KR',serif;font-weight:900;font-size:28px;line-height:1.3;letter-spacing:-.04em;margin-bottom:8px}
.r-tag{font-size:14px;color:var(--tx2);margin-bottom:20px}
.r-score-ring{position:relative;width:140px;height:140px;margin:0 auto 12px}
.r-score-ring canvas{width:100%;height:100%}
.r-score-num{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center}
.r-score-num strong{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:40px;color:var(--tx)}
.r-score-num span{font-size:12px;color:var(--tx3)}
.r-pctl{font-size:13px;color:var(--tx2);margin-top:8px}
.r-pctl b{color:var(--accent);font-weight:800}
.r-quote{font-size:13px;color:var(--tx3);font-style:italic;margin-top:16px;padding:0 20px;line-height:1.6}

.r-stats{padding:28px 24px}
.sec-tit{font-size:18px;font-weight:800;margin-bottom:18px;letter-spacing:-.04em}
.stat-row{display:flex;align-items:center;margin-bottom:14px}
.stat-icon{width:28px;font-size:18px;text-align:center;margin-right:10px}
.stat-info{flex:1}
.stat-hd{display:flex;justify-content:space-between;margin-bottom:4px}
.stat-name{font-size:14px;font-weight:700}
.stat-val{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px}
.stat-bar-bg{height:8px;background:var(--line);border-radius:4px}
.stat-bar{height:100%;border-radius:4px;transition:width .6s}

.r-sw{padding:28px 24px;border-top:1px solid var(--line)}
.sw-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:12px}
.sw-card:last-child{margin-bottom:0}
.sw-label{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;letter-spacing:.02em}
.sw-label.weak{color:var(--blue)}
.sw-name{font-weight:800;font-size:16px;margin-bottom:4px}
.sw-desc{font-size:13px;color:var(--tx2);line-height:1.55}

.ctx-article-wrap{padding:0 24px;margin-top:20px}
.ctx-article-label{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px;letter-spacing:-.02em}
.ctx-article{display:flex;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .2s,box-shadow .2s}
.ctx-article:active{transform:scale(.97)}
.ctx-article .ca-img{width:110px;min-height:110px;flex-shrink:0;overflow:hidden}
.ctx-article .ca-img img{width:100%;height:100%;object-fit:cover}
.ctx-article .ca-body{flex:1;padding:14px 14px 14px 0;display:flex;flex-direction:column;justify-content:center}
.ctx-article .ca-reason{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:4px}
.ctx-article .ca-title{font-size:15px;font-weight:700;line-height:1.45;color:var(--tx);letter-spacing:-.03em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ctx-article .ca-cta{font-size:12px;color:var(--tx3);margin-top:8px}
.ctx-article .ca-cta span{color:var(--accent);font-weight:700}

.reco-section{padding:28px 24px;border-top:1px solid var(--line)}
.reco-section .sec-tit{font-size:18px;font-weight:800;margin-bottom:6px;letter-spacing:-.04em}
.reco-section .sec-sub{font-size:13px;color:var(--tx3);margin-bottom:20px;line-height:1.5}
.ctx-article-full{display:block;border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);transition:transform .2s;margin-bottom:12px}
.ctx-article-full:active{transform:scale(.97)}
.ctx-article-full .caf-img{width:100%;aspect-ratio:16/9;overflow:hidden}
.ctx-article-full .caf-img img{width:100%;height:100%;object-fit:cover}
.ctx-article-full .caf-body{padding:16px}
.ctx-article-full .caf-reason{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:4px}
.ctx-article-full .caf-title{font-size:17px;font-weight:800;line-height:1.4;letter-spacing:-.03em;color:var(--tx)}
.ctx-article-full .caf-cta{font-size:12px;color:var(--tx3);margin-top:10px}
.ctx-article-full .caf-cta span{color:var(--accent);font-weight:700}

.r-advice{padding:28px 24px;border-top:1px solid var(--line)}
.adv-box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}
.adv-box p{font-size:14px;line-height:1.7;color:var(--tx2)}

.r-tip{padding:28px 24px;border-top:1px solid var(--line)}
.tip-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}
.tip-week{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px}
.tip-title{font-weight:800;font-size:16px;margin-bottom:8px;letter-spacing:-.02em}
.tip-body{font-size:14px;color:var(--tx2);line-height:1.65}

.r-hex{padding:28px 24px;border-top:1px solid var(--line);text-align:center}
.r-hex canvas{max-width:300px;width:100%;aspect-ratio:1/1}

.r-actions{padding:20px 24px 0;display:flex;gap:10px}
.btn-share{flex:1;padding:16px;border:none;border-radius:14px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s}
.btn-share:active{transform:scale(.96)}
.btn-retry{flex:1;padding:16px;border:2px solid var(--line);border-radius:14px;background:var(--card);font-size:15px;font-weight:700;cursor:pointer;transition:border-color .2s}
.btn-retry:active{border-color:var(--accent)}

#shared-result{display:none;min-height:100dvh;flex-direction:column}
#shared-result.active{display:flex}
.shared-cta{text-align:center;padding:24px}
.btn-try{display:inline-block;padding:16px 40px;border:none;border-radius:16px;background:var(--accent);color:#fff;font-size:17px;font-weight:800;cursor:pointer;text-decoration:none;transition:transform .15s}
.btn-try:active{transform:scale(.96)}
</style>
</head>
<body>

<section id="intro" class="active">
  <div class="intro-eyebrow">SEXUAL WELLNESS TEST</div>
  <h1 class="intro-title">나의 성생활<br>능력치는?</h1>
  <p class="intro-sub">체력, 감각, 소통, 유대, 멘탈, 지식<br>6가지 능력치로 당신의 밤을 분석합니다</p>
  <div class="trust-bar">
    <span class="trust-dot">WHO 가이드라인</span>
    <span class="trust-dot">FSFI / IIEF</span>
    <span class="trust-dot">Natsal-SF</span>
    <span class="trust-dot">NSSS</span>
  </div>
  <div class="social-proof">
    <div class="sp-item"><div class="sp-num" id="counterDisplay">…</div><div class="sp-label">참여자</div></div>
    <div class="sp-item"><div class="sp-num">4.6/5</div><div class="sp-label">평균 만족도</div></div>
    <div class="sp-item"><div class="sp-num">2분</div><div class="sp-label">소요시간</div></div>
  </div>
  <p class="intro-ref">본 테스트는 WHO 성건강 프레임워크와 FSFI·IIEF·NSSS 등 국제 성건강 척도를 참고하여 구성되었습니다.</p>
  <div class="provoke-box">
    <p class="provoke-q">당신은 평균 이상일까요?</p>
    <div class="provoke-row">
      <div><div class="provoke-pct red">62%</div><div class="provoke-label">남성 평균 이하</div></div>
      <div><div class="provoke-pct blue">58%</div><div class="provoke-label">여성 평균 이하</div></div>
    </div>
    <p class="provoke-note">* 기존 참여자 기준</p>
  </div>
  <button class="btn-start" onclick="go('profile')">테스트 시작하기</button>
</section>

<section id="profile">
  <div class="profile-wrap">
    <h2>기본 정보</h2>
    <div class="gender-row">
      <button class="g-btn" onclick="pk(this,'M')">🙋‍♂️ 남성</button>
      <button class="g-btn" onclick="pk(this,'F')">🙋‍♀️ 여성</button>
    </div>
    <div class="age-group">
      <label>연령대</label>
      <select id="ageSelect">
        <option value="" disabled selected>선택하세요</option>
        <option>10대</option><option>20대 초반</option><option>20대 후반</option>
        <option>30대 초반</option><option>30대 후반</option><option>40대 이상</option>
      </select>
    </div>
    <button class="btn-next" onclick="startQuiz()">다음</button>
  </div>
</section>

<section id="quiz">
  <div class="quiz-wrap">
    <div class="q-progress"><div class="q-bar-bg"><div class="q-bar" id="qBar"></div></div><div class="q-num" id="qNum"></div></div>
    <div class="q-body"><p id="qTxt"></p></div>
    <div class="opts" id="opts"></div>
    <div class="nav-row">
      <button class="nav-btn" id="btnPrev" onclick="goBack()" disabled>← 이전</button>
      <button class="nav-btn primary" id="btnNext" onclick="goNext()" disabled>다음 →</button>
    </div>
  </div>
</section>

<section id="loading">
  <div class="ld-title">능력치 분석 중…</div>
  <div class="ld-bar-bg"><div class="ld-bar" id="ldBar"></div></div>
  <div class="ld-pct" id="ldPct">0%</div>
</section>

<section id="result"><div id="resultInner"></div></section>
<section id="shared-result"><div id="sharedInner"></div></section>

<script>
/* =============================================================
   ★ 카운터 API — 서버/가입 필요 없음
   키를 고유하게 유지하세요. 아래 키를 원하는 이름으로 바꿔도 됩니다.
   ============================================================= */
var COUNTER_KEY='tryme-sex-score-test-20260426';
var COUNTER_API='https://countapi.mileshilliard.com/api/v1';

function loadCounter(){
  fetch(COUNTER_API+'/get/'+COUNTER_KEY)
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.value){
        document.getElementById('counterDisplay').textContent=Number(d.value).toLocaleString();
      }else{
        /* 키가 아직 없으면 초기값 세팅 */
        fetch(COUNTER_API+'/set/'+COUNTER_KEY+'?value=24817')
          .then(function(){document.getElementById('counterDisplay').textContent='24,817';});
      }
    })
    .catch(function(){document.getElementById('counterDisplay').textContent='24,817';});
}

function incrementCounter(){
  fetch(COUNTER_API+'/hit/'+COUNTER_KEY).catch(function(){});
}

/* ======== DATA ======== */
var COMMON=[
  {q:"파트너와 함께한 밤, 다음 날 컨디션은?",c:"stm",o:["완전 지침",1,"좀 피곤",2,"보통",3,"괜찮음",4,"오히려 활력",5]},
  {q:"새로운 시도를 제안받으면?",c:"opn",o:["절대 싫어",1,"좀 불편",2,"일단 들어봄",3,"관심 생김",4,"바로 해보자!",5]},
  {q:"관계 중 원하는 걸 말로 표현하는 편?",c:"comm",o:["거의 못함",1,"어려움",2,"가끔",3,"자주",4,"자연스럽게",5]},
  {q:"성관계 후 느끼는 감정은?",c:"bond",o:["공허함",1,"그냥 그럼",2,"편안함",3,"행복함",4,"깊은 유대감",5]},
  {q:"성적 자신감 정도는?",c:"conf",o:["매우 낮음",1,"낮은 편",2,"보통",3,"높은 편",4,"매우 높음",5]},
  {q:"피임·성건강 지식 수준은?",c:"know",o:["거의 모름",1,"조금 앎",2,"보통",3,"잘 아는 편",4,"전문 수준",5]},
  {q:"관계 중 상대 반응을 얼마나 살피나요?",c:"sens",o:["거의 안 봄",1,"가끔",2,"보통",3,"자주",4,"항상 민감하게",5]},
  {q:"스킨십(비성적 포함)을 자주 하나요?",c:"bond",o:["거의 없음",1,"가끔",2,"보통",3,"자주",4,"매일",5]},
  {q:"성관계 빈도에 만족하나요?",c:"comm",o:["매우 불만",1,"불만",2,"보통",3,"만족",4,"매우 만족",5]},
  {q:"성 관련 고민을 터놓을 사람이 있나요?",c:"know",o:["전혀 없음",1,"거의 없음",2,"한두 명",3,"있음",4,"편하게 여러 명",5]},
  {q:"체력이 관계 퀄리티에 영향을 준다고 느끼나요?",c:"stm",o:["전혀",1,"조금",2,"보통",3,"꽤",4,"매우 많이",5]},
  {q:"평소 운동을 얼마나 하나요?",c:"stm",o:["전혀 안 함",1,"가끔",2,"주 1~2회",3,"주 3~4회",4,"거의 매일",5]},
  {q:"관계 중 체력이 부족하다고 느낀 적?",c:"stm",o:["항상",1,"자주",2,"가끔",3,"거의 없음",4,"전혀 없음",5]},
  {q:"분위기를 만드는 능력이 있다고 생각?",c:"sens",o:["전혀",1,"약간",2,"보통",3,"잘하는 편",4,"자신 있음",5]},

var GD='',AGE='',QS=[],ci=0,ANS={};

/* ======== NAV ======== */
function go(id){document.querySelectorAll('section').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function pk(btn,g){GD=g;document.querySelectorAll('.g-btn').forEach(function(b){b.classList.remove('sel');});btn.classList.add('sel');}
function startQuiz(){AGE=document.getElementById('ageSelect').value;if(!GD||!AGE){alert('성별과 연령대를 선택해주세요.');return;}QS=COMMON.concat(GD==='M'?M_BODY:F_BODY);ci=0;ANS={};go('quiz');stQ();}
function stQ(){
  var q=QS[ci];
  document.getElementById('qBar').style.width=((ci+1)/QS.length*100)+'%';
  document.getElementById('qNum').textContent=(ci+1)+'/'+QS.length;
  document.getElementById('qTxt').textContent=q.q;
  var oh='';
  for(var i=0;i<q.o.length;i+=2){
    var sel=ANS[ci]===q.o[i+1]?' sel':'';
    oh+='<button class="opt-btn'+sel+'" data-val="'+q.o[i+1]+'" onclick="ans(this,'+q.o[i+1]+')">'+q.o[i]+'</button>';
  }
  document.getElementById('opts').innerHTML=oh;
  document.getElementById('btnPrev').disabled=(ci===0);
  document.getElementById('btnNext').disabled=(ANS[ci]===undefined);
}
function ans(btn,v){
  ANS[ci]=v;
  document.querySelectorAll('.opt-btn').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
  document.getElementById('btnNext').disabled=false;
  setTimeout(function(){if(ci<QS.length-1){ci++;stQ();}else{go('loading');runLoad();}},300);
}
function goBack(){if(ci>0){ci--;stQ();}}
function goNext(){if(ANS[ci]===undefined)return;if(ci<QS.length-1){ci++;stQ();}else{go('loading');runLoad();}}

/* ======== LOADING ======== */
function runLoad(){
  var p=0;
  var iv=setInterval(function(){
    p+=Math.random()*8+2;if(p>100)p=100;
    document.getElementById('ldBar').style.width=p+'%';
    document.getElementById('ldPct').textContent=Math.floor(p)+'%';
    if(p>=100){clearInterval(iv);setTimeout(calc,400);}
  },120);
}

/* ======== CALC ======== */
function phi(z){var a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;var s=1;if(z<0)s=-1;z=Math.abs(z)/Math.sqrt(2);var t=1/(1+p*z);var y=1-((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t*Math.exp(-z*z);return 0.5*(1+s*y);}
function pctl(score){var mean=62,sd=14;return Math.round(phi((score-mean)/sd)*100);}

function calc(){
  var sc={stm:0,sens:0,comm:0,bond:0,conf:0,know:0};
  var cn={stm:0,sens:0,comm:0,bond:0,conf:0,know:0};
  QS.forEach(function(q,i){if(ANS[i]!==undefined){sc[q.c]+=ANS[i];cn[q.c]++;}});
  SK.forEach(function(k){sc[k]=cn[k]?Math.round(sc[k]/cn[k]/5*100):50;});
  var total=0;SK.forEach(function(k){total+=sc[k];});
  var avg=Math.round(total/6);
  var tier=avg>=92?'SS':avg>=80?'S':avg>=68?'A':avg>=52?'B':avg>=36?'C':'D';
  var nm=NM[tier];
  var pc=pctl(avg);
  var sorted=SK.slice().sort(function(a,b){return sc[b]-sc[a];});
  var strongest=sorted[0],weakest=sorted[sorted.length-1];

  incrementCounter();

  var h=buildResultHTML(sc,avg,tier,nm,pc,sorted,strongest,weakest,false);
  window._rName=nm.n;window._rTag=nm.t;window._rScore=avg;
  window._shareData={g:GD,s:sc,a:avg,t:tier};

  document.getElementById('resultInner').innerHTML=h;
  go('result');
  window.scrollTo(0,0);
  setTimeout(function(){drawRing('ringCv',avg);},100);
  setTimeout(function(){drawH('hexCv',sc);},200);
}

  }else{
    h+='<div class="r-actions">';
    h+='<button class="btn-share" onclick="shareResult()">결과 공유하기</button>';
    h+='<button class="btn-retry" onclick="retry()">다시하기</button>';
    h+='</div>';
  }
  return h;
}

/* ======== 차트 ======== */
function drawRing(id,avg){
  var cv=document.getElementById(id);if(!cv)return;
  var ctx=cv.getContext('2d');
  var cx=140,cy=140,r=120,lw=14;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#E8E2D8';ctx.lineWidth=lw;ctx.stroke();
  var end=-Math.PI/2+(Math.PI*2*(avg/100));
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,end);ctx.strokeStyle='#C8102E';ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();
}
function drawH(id,sc){
  var cv=document.getElementById(id);if(!cv)return;
  var ctx=cv.getContext('2d');
  var cx=300,cy=300,R=200;
  ctx.clearRect(0,0,600,600);
  [1,.75,.5,.25].forEach(function(f){
    ctx.beginPath();SK.forEach(function(k,i){var a=-Math.PI/2+(Math.PI*2/6)*i;var x=cx+R*f*Math.cos(a),y=cy+R*f*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.closePath();ctx.strokeStyle='#E0DBD2';ctx.lineWidth=1;ctx.stroke();
  });
  SK.forEach(function(k,i){
    var a=-Math.PI/2+(Math.PI*2/6)*i;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));ctx.strokeStyle='#E0DBD2';ctx.lineWidth=1;ctx.stroke();
  });
  ctx.beginPath();
  SK.forEach(function(k,i){var a=-Math.PI/2+(Math.PI*2/6)*i;var v=sc[k]/100;var x=cx+R*v*Math.cos(a),y=cy+R*v*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.closePath();ctx.fillStyle='rgba(200,16,46,0.13)';ctx.fill();ctx.strokeStyle='#C8102E';ctx.lineWidth=2.5;ctx.stroke();
  SK.forEach(function(k,i){
    var a=-Math.PI/2+(Math.PI*2/6)*i;var v=sc[k]/100;
    var x=cx+R*v*Math.cos(a),y=cy+R*v*Math.sin(a);
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fillStyle='#C8102E';ctx.fill();
  });
  SK.forEach(function(k,i){
    var a=-Math.PI/2+(Math.PI*2/6)*i;
    var lx=cx+(R+22)*Math.cos(a),ly=cy+(R+22)*Math.sin(a);
    ctx.font='600 11px Pretendard';ctx.fillStyle='#8A847A';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(SN[k],lx,ly);
  });
}

/* ======== 공유 ======== */
function shareResult(){
  var d=window._shareData;
  var payload=JSON.stringify(d);
  var encoded=btoa(unescape(encodeURIComponent(payload)));
  var url=location.origin+location.pathname+'?r='+encodeURIComponent(encoded);

  if(navigator.share){
    navigator.share({title:'나의 성생활 능력치 결과',text:window._rName+' — '+window._rTag,url:url}).catch(function(){copyToClip(url);});
  }else{
    copyToClip(url);
  }
}
function copyToClip(txt){
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(txt).then(function(){alert('공유 링크가 복사되었어요!\n친구에게 보내보세요.');});
  }else{
    var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    alert('공유 링크가 복사되었어요!\n친구에게 보내보세요.');
  }
}

/* ======== 공유 링크 복원 ======== */
function checkShared(){
  var params=new URLSearchParams(location.search);
  var r=params.get('r');
  if(!r)return false;
  try{
    var json=decodeURIComponent(escape(atob(decodeURIComponent(r))));
    var d=JSON.parse(json);
    var sc=d.s;var avg=d.a;var tier=d.t;
    var nm=NM[tier];var pc=pctl(avg);
    var sorted=SK.slice().sort(function(a,b){return sc[b]-sc[a];});
    var strongest=sorted[0],weakest=sorted[sorted.length-1];
    var h=buildResultHTML(sc,avg,tier,nm,pc,sorted,strongest,weakest,true);
    document.getElementById('sharedInner').innerHTML=h;
    document.querySelectorAll('section').forEach(function(s){s.classList.remove('active');});
    document.getElementById('shared-result').classList.add('active');
    setTimeout(function(){drawRing('ringCvS',avg);},100);
    setTimeout(function(){drawH('hexCvS',sc);},200);
    return true;
  }catch(e){return false;}
}

/* ======== INIT ======== */
(function(){
  if(!checkShared()){
    loadCounter();
  }
})();
