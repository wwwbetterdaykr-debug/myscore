<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>나의 성생활 능력치?</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');

:root{
--bg:#F5F1EB;--card:#FFFDF9;--tx:#2C2925;--tx2:#6B6560;--tx3:#8A847A;
--accent:#1e5852;--accent-light:#e8f0ef;--line:#E8E2D8;
--c1:#1e5852;--c2:#5B8A72;--c3:#3D7A9E;--c4:#8B6E5A;--c5:#7A6B8A;--c6:#A68B5B;
}
*{margin:0;padding:0;box-sizing:border-box}
/* body에 touch-action: manipulation 추가 (더블탭 확대 방지) */
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;overflow-x:hidden;touch-action:manipulation}
section{display:none;min-height:100dvh}
section.active{display:flex;flex-direction:column}

#intro{justify-content:center;align-items:center;padding:24px;text-align:center}
.intro-eyebrow{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.04em;margin-bottom:8px}
.intro-title{font-family:'Noto Serif KR',serif;font-weight:900;font-size:32px;line-height:1.3;letter-spacing:-.04em;margin-bottom:12px}
.intro-sub{font-size:15px;color:var(--tx2);line-height:1.6;margin-bottom:28px}
.trust-bar{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.trust-dot{font-size:11px;font-weight:600;color:var(--tx3);background:var(--card);border:1px solid var(--line);border-radius:0;padding:4px 10px}
.social-proof{display:flex;justify-content:center;gap:18px;margin-bottom:18px}
.sp-item{text-align:center}
.sp-num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:var(--tx)}
.sp-label{font-size:11px;color:var(--tx3);margin-top:2px}
.intro-ref{font-size:11px;color:var(--tx3);line-height:1.5;margin-bottom:24px;padding:0 12px}
.provoke-box{background:var(--card);border:1px solid var(--line);border-radius:0;padding:20px;margin-bottom:32px;max-width:320px;width:100%}
.provoke-q{font-weight:800;font-size:15px;margin-bottom:12px}
.provoke-row{display:flex;justify-content:center;gap:24px;margin-bottom:6px}
.provoke-pct{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px}
.provoke-pct.m{color:var(--c1)}
.provoke-pct.f{color:var(--c3)}
.provoke-label{font-size:12px;color:var(--tx3)}
.provoke-note{font-size:11px;color:var(--tx3)}
.btn-start{width:100%;max-width:320px;padding:18px;border:none;border-radius:0;background:var(--accent);color:#fff;font-size:17px;font-weight:800;cursor:pointer;letter-spacing:-.03em;transition:transform .15s}
.btn-start:active{transform:scale(.97)}

#profile{justify-content:center;align-items:center;padding:24px}
.profile-wrap{width:100%;max-width:360px}
.profile-wrap h2{font-family:'Noto Serif KR',serif;font-weight:900;font-size:24px;text-align:center;margin-bottom:32px;letter-spacing:-.04em}
.gender-row{display:flex;gap:12px;margin-bottom:24px}
.g-btn{flex:1;padding:18px;border:2px solid var(--line);border-radius:0;background:var(--card);font-size:16px;font-weight:700;cursor:pointer;transition:border-color .2s,background .2s;text-align:center}
.g-btn.sel{border-color:var(--accent);background:var(--accent-light)}
.age-group label{display:block;font-size:14px;font-weight:700;margin-bottom:8px}
.age-group select{width:100%;padding:16px;border:2px solid var(--line);border-radius:0;background:var(--card);font-size:15px;font-family:inherit;appearance:none;-webkit-appearance:none}
.btn-next{width:100%;padding:18px;border:none;border-radius:0;background:var(--accent);color:#fff;font-size:17px;font-weight:800;margin-top:32px;cursor:pointer;letter-spacing:-.03em;transition:transform .15s}
.btn-next:active{transform:scale(.97)}

#quiz{padding:24px;align-items:center}
.quiz-wrap{width:100%;max-width:400px;flex:1;display:flex;flex-direction:column}
.q-progress{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.q-bar-bg{flex:1;height:4px;background:var(--line);border-radius:0}
.q-bar{height:100%;background:var(--accent);border-radius:0;transition:width .3s}
.q-num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:var(--tx3);min-width:42px;text-align:right}
.q-body{flex:1;display:flex;justify-content:center;align-items:center;text-align:center;padding:20px 0}
.q-body p{font-weight:800;font-size:26px;line-height:1.45;letter-spacing:-.04em}
.opts{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.opt-btn{padding:16px;border:2px solid var(--line);border-radius:0;background:var(--card);font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:border-color .2s,background .2s, color .2s}
.opt-btn.sel{border-color:var(--accent);background:var(--accent-light);color:var(--tx);}
.nav-row{display:flex;gap:10px;margin-top:auto;padding-bottom:12px}
.nav-btn{flex:1;padding:14px;border:2px solid var(--line);border-radius:0;background:var(--card);font-size:15px;font-weight:700;cursor:pointer;text-align:center;transition:border-color .2s,background .2s,opacity .2s}
.nav-btn:disabled{opacity:.35;cursor:default}
.nav-btn.primary{border-color:var(--accent);background:var(--accent);color:#fff}

#loading{justify-content:center;align-items:center;text-align:center;padding:24px}
.ld-title{font-family:'Noto Serif KR',serif;font-weight:900;font-size:22px;margin-bottom:16px}
.ld-bar-bg{width:200px;height:4px;background:var(--line);border-radius:0;overflow:hidden}
.ld-bar{height:100%;width:0;background:var(--accent);border-radius:0;transition:width .3s}
.ld-pct{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:var(--tx3);margin-top:8px}

#result{padding:0 0 60px}
.r-hero{text-align:center;padding:48px 24px 32px;background:linear-gradient(180deg,#FFFDF9 0%,var(--bg) 100%)}
.r-tier{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.04em;margin-bottom:4px}
.r-name{font-family:'Noto Serif KR',serif;font-weight:900;font-size:28px;line-height:1.3;letter-spacing:-.04em;margin-bottom:8px}
.r-tag{font-size:14px;color:var(--tx2);margin-bottom:20px}
.r-score-ring{position:relative;width:140px;height:140px;margin:0 auto 12px}
.r-score-ring canvas{width:100%;height:100%}
.r-score-num{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center}
.r-score-num strong{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:40px;color:var(--tx)}
.r-score-num span{font-size:12px;color:var(--tx3)}
.r-pctl{font-size:13px;color:var(--tx2);margin-top:8px}
.r-pctl b{color:var(--accent);font-weight:800}
.r-quote{font-size:13px;color:var(--tx3);font-style:italic;margin-top:16px;padding:0 20px;line-height:1.6}

.r-stats{padding:28px 24px}
.sec-tit{font-size:18px;font-weight:800;margin-bottom:18px;letter-spacing:-.04em}
.stat-row{display:flex;align-items:center;margin-bottom:14px}
.stat-icon{width:28px;font-size:18px;text-align:center;margin-right:10px}
.stat-info{flex:1}
.stat-hd{display:flex;justify-content:space-between;margin-bottom:4px}
.stat-name{font-size:14px;font-weight:700}
.stat-val{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px}
.stat-bar-bg{height:6px;background:var(--line);border-radius:0}
.stat-bar{height:100%;border-radius:0;transition:width .6s}

.r-sw{padding:28px 24px;border-top:1px solid var(--line)}
.sw-card{background:var(--card);border:1px solid var(--line);border-radius:0;padding:20px;margin-bottom:12px}
.sw-card:last-child{margin-bottom:0}
.sw-label{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;letter-spacing:.02em}
.sw-label.weak{color:var(--c3)}
.sw-name{font-weight:800;font-size:16px;margin-bottom:4px}
.sw-desc{font-size:13px;color:var(--tx2);line-height:1.55}

.ctx-article-wrap{padding:0 24px;margin-top:20px}
.ctx-article-label{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px;letter-spacing:-.02em}
.ctx-article{display:flex;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:0;overflow:hidden;text-decoration:none;color:inherit;transition:transform .2s}

.ctx-article .ca-img{width:110px;min-height:110px;flex-shrink:0;overflow:hidden}

.ctx-article .ca-body{flex:1;padding:14px 14px 14px 0;display:flex;flex-direction:column;justify-content:center}
.ctx-article .ca-reason{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:4px}
.ctx-article .ca-title{font-size:15px;font-weight:700;line-height:1.45;color:var(--tx);letter-spacing:-.03em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ctx-article .ca-cta{font-size:12px;color:var(--tx3);margin-top:8px}
.ctx-article .ca-cta span{color:var(--accent);font-weight:700}

.reco-section{padding:28px 24px;border-top:1px solid var(--line)}
.reco-section .sec-tit{font-size:18px;font-weight:800;margin-bottom:6px;letter-spacing:-.04em}
.reco-section .sec-sub{font-size:13px;color:var(--tx3);margin-bottom:20px;line-height:1.5}
.ctx-article-full{display:block;border-radius:0;overflow:hidden;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);transition:transform .2s;margin-bottom:12px}
.ctx-article-full:active{transform:scale(.98)}
.ctx-article-full .caf-img{width:100%;aspect-ratio:16/9;overflow:hidden}
.ctx-article-full .caf-img img{width:100%;height:100%;object-fit:cover}
.ctx-article-full .caf-body{padding:16px}
.ctx-article-full .caf-reason{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:4px}
.ctx-article-full .caf-title{font-size:17px;font-weight:800;line-height:1.4;letter-spacing:-.03em;color:var(--tx)}
.ctx-article-full .caf-cta{font-size:12px;color:var(--tx3);margin-top:10px}
.ctx-article-full .caf-cta span{color:var(--accent);font-weight:700}

.r-advice{padding:28px 24px;border-top:1px solid var(--line)}
.adv-box{background:var(--card);border:1px solid var(--line);border-radius:0;padding:20px}
.adv-box p{font-size:14px;line-height:1.7;color:var(--tx2)}

.r-tip{padding:28px 24px;border-top:1px solid var(--line)}
.tip-card{background:var(--card);border:1px solid var(--line);border-radius:0;padding:20px}
.tip-week{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px}
.tip-title{font-weight:800;font-size:16px;margin-bottom:8px;letter-spacing:-.02em}
.tip-body{font-size:14px;color:var(--tx2);line-height:1.65}

.r-hex{padding:28px 24px;border-top:1px solid var(--line);text-align:center}
.r-hex canvas{max-width:300px;width:100%;aspect-ratio:1/1}

.r-actions{padding:20px 24px 0;display:flex;gap:10px}
.btn-share{flex:1;padding:16px;border:none;border-radius:0;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s}
.btn-share:active{transform:scale(.97)}
.btn-retry{flex:1;padding:16px;border:2px solid var(--line);border-radius:0;background:var(--card);font-size:15px;font-weight:700;cursor:pointer;transition:border-color .2s}
.btn-retry:active{border-color:var(--accent)}

#shared-result{display:none;min-height:100dvh;flex-direction:column}
#shared-result.active{display:flex}
.shared-cta{text-align:center;padding:24px}
.btn-try{display:inline-block;padding:16px 40px;border:none;border-radius:0;background:var(--accent);color:#fff;font-size:17px;font-weight:800;cursor:pointer;text-decoration:none;transition:transform .15s}
.btn-try:active{transform:scale(.97)}
</style>
</head>
<body>

<section id="intro" class="active">
  <div class="intro-eyebrow">SEXUAL WELLNESS TEST</div>

<script>

   모바일 핀치 줌 / 더블탭 줌 완벽 방지 코드
   ======================================= */
// 손가락 두 개로 확대(Pinch to Zoom) 방지
document.addEventListener('touchstart', function(event) {
  if (event.touches.length > 1) {
    event.preventDefault();
  }
}, { passive: false });

// 연속 두 번 터치(Double Tap to Zoom) 방지
var lastTouchEnd = 0;
document.addEventListener('touchend', function(event) {
  var now = (new Date()).getTime();
  if (now - lastTouchEnd <= 300) {
    event.preventDefault();
  }
  lastTouchEnd = now;
}, { passive: false });
/* ======================================= */

function phi(z){var a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;var s=1;if(z<0)s=-1;z=Math.abs(z)/Math.sqrt(2);var t=1/(1+p*z);var y=1-((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t*Math.exp(-z*z);return 0.5*(1+s*y);}
function pctl(score){var mean=62,sd=14;return Math.round(phi((score-mean)/sd)*100);}

function calc(){
  var sc={stm:0,sens:0,comm:0,bond:0,conf:0,know:0};
  var cn={stm:0,sens:0,comm:0,bond:0,conf:0,know:0};
  QS.forEach(function(q,i){if(ANS[i]!==undefined){sc[q.c]+=ANS[i];cn[q.c]++;}});
  SK.forEach(function(k){sc[k]=cn[k]?Math.round(sc[k]/cn[k]/5*100):50;});
  var total=0;SK.forEach(function(k){total+=sc[k];});
  var avg=Math.round(total/6);
  var tier=avg>=92?'SS':avg>=80?'S':avg>=68?'A':avg>=52?'B':avg>=36?'C':'D';
  var nm=NM[tier];var pc=pctl(avg);
  var sorted=SK.slice().sort(function(a,b){return sc[b]-sc[a];});
  var strongest=sorted[0],weakest=sorted[sorted.length-1];
  incrementCounter();
  var h=buildResultHTML(sc,avg,tier,nm,pc,sorted,strongest,weakest,false);
  window._rName=nm.n;window._rTag=nm.t;window._rScore=avg;
  window._shareData={g:GD,s:sc,a:avg,t:tier};
  document.getElementById('resultInner').innerHTML=h;
  go('result');window.scrollTo(0,0);
  setTimeout(function(){drawRing('ringCv',avg);},100);
  setTimeout(function(){drawH('hexCv',sc);},200);
}

  h+='<div class="r-stats"><div class="sec-tit">Ability Stats</div>';
  sorted.forEach(function(k){
    h+='<div class="stat-row"><div class="stat-icon">'+SM[k]+'</div><div class="stat-info"><div class="stat-hd"><span class="stat-name">'+SN[k]+'</span><span class="stat-val" style="color:'+SC[k]+'">'+sc[k]+'</span></div><div class="stat-bar-bg"><div class="stat-bar" style="width:'+sc[k]+'%;background:'+SC[k]+'"></div></div></div></div>';
  });
  h+='</div>';
  h+='<div class="r-hex"><div class="sec-tit">능력치 차트</div><canvas id="'+hexId+'" width="600" height="600"></canvas></div>';
  h+='<div class="r-sw"><div class="sec-tit">Strength & Weakness</div>';
  h+='<div class="sw-card"><div class="sw-label">💪 STRONGEST</div><div class="sw-name">'+SM[strongest]+' '+SN[strongest]+' '+sc[strongest]+'점</div><div class="sw-desc">'+strDesc+'</div></div>';
  h+='<div class="sw-card"><div class="sw-label weak">📉 WEAKEST</div><div class="sw-name">'+SM[weakest]+' '+SN[weakest]+' '+sc[weakest]+'점</div><div class="sw-desc">'+weakDesc+'</div></div></div>';
  h+=weakArtH;
  h+='<div class="r-advice"><div class="sec-tit">맞춤 조언</div><div class="adv-box"><p>'+advTxt+'</p></div></div>';
  h+=recoH;
  h+='<div class="r-tip"><div class="sec-tit">Weekly Tip</div><div class="tip-card"><div class="tip-week">'+tip.w+'</div><div class="tip-title">'+tip.title+'</div><div class="tip-body">'+tip.body+'</div></div></div>';
  if(isShared){h+='<div class="shared-cta"><button class="btn-try" onclick="location.href=location.origin+location.pathname">나도 테스트 해보기</button></div>';}
  else{h+='<div class="r-actions"><button class="btn-share" onclick="shareResult()">결과 공유하기</button><button class="btn-retry" onclick="retry()">다시하기</button></div>';}
  return h;
}

function drawRing(id,avg){
  var cv=document.getElementById(id);if(!cv)return;var ctx=cv.getContext('2d');
  var cx=140,cy=140,r=120,lw=14;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#E8E2D8';ctx.lineWidth=lw;ctx.stroke();
  var end=-Math.PI/2+(Math.PI*2*(avg/100));
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,end);ctx.strokeStyle='#1e5852';ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();
}
function drawH(id,sc){
  var cv=document.getElementById(id);if(!cv)return;var ctx=cv.getContext('2d');
  var cx=300,cy=300,R=200;ctx.clearRect(0,0,600,600);
  [1,.75,.5,.25].forEach(function(f){ctx.beginPath();SK.forEach(function(k,i){var a=-Math.PI/2+(Math.PI*2/6)*i;var x=cx+R*f*Math.cos(a),y=cy+R*f*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.closePath();ctx.strokeStyle='#E0DBD2';ctx.lineWidth=1;ctx.stroke();});
  SK.forEach(function(k,i){var a=-Math.PI/2+(Math.PI*2/6)*i;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));ctx.strokeStyle='#E0DBD2';ctx.lineWidth=1;ctx.stroke();});
  ctx.beginPath();SK.forEach(function(k,i){var a=-Math.PI/2+(Math.PI*2/6)*i;var v=sc[k]/100;var x=cx+R*v*Math.cos(a),y=cy+R*v*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.closePath();ctx.fillStyle='rgba(30,88,82,0.12)';ctx.fill();ctx.strokeStyle='#1e5852';ctx.lineWidth=2.5;ctx.stroke();
  SK.forEach(function(k,i){var a=-Math.PI/2+(Math.PI*2/6)*i;var v=sc[k]/100;var x=cx+R*v*Math.cos(a),y=cy+R*v*Math.sin(a);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#1e5852';ctx.fill();});
  SK.forEach(function(k,i){var a=-Math.PI/2+(Math.PI*2/6)*i;var lx=cx+(R+22)*Math.cos(a),ly=cy+(R+22)*Math.sin(a);ctx.font='600 11px Pretendard';ctx.fillStyle='#8A847A';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(SN[k],lx,ly);});
}

function lowAct(key){
  var m={
    stm:'체력은 성생활의 기초예요. 주 3회 이상 유산소 운동과 코어 운동을 시작해보세요. 수면의 질도 함께 챙기면 자신감과 지속력 모두 올라가요.',
    sens:'감각은 서두르지 않을 때 깨어나요. 전희 시간을 10분 이상으로 늘려보고, 새로운 감각(온도·질감·향)을 탐색해보세요. 마인드풀 터치를 연습하면 감각이 크게 달라져요.',
    comm:'소통은 연습이에요. "나는 이럴 때 좋아"처럼 I-message로 시작해보세요. 평소에 성적 선호를 대화하는 습관을 들이면, 침대 위 소통이 자연스러워져요.',
    bond:'유대감은 비성적 스킨십에서 시작돼요. 하루 30초 포옹, 눈 맞춤, 관계 후 대화를 실천해보세요. 작은 루틴이 깊은 정서적 연결로 이어져요.',
    conf:'자신감은 경험과 자기 수용에서 와요. 부정적인 셀프토크를 알아차리고, 나의 매력 포인트 3가지를 적어보세요. 필요하다면 전문 상담도 큰 도움이 돼요.',
    know:'지식은 가장 빠르게 올릴 수 있는 영역이에요. 피임법, 성건강 검진 주기, 성반응 사이클을 한번 찾아보세요. 정확한 지식이 불안을 줄이고 관계의 질을 높여줘요.'
  };
  return m[key]||'각 영역을 균형 있게 발전시켜 보세요.';
}

function shareResult(){
  var d=window._shareData;var payload=JSON.stringify(d);
  var encoded=btoa(unescape(encodeURIComponent(payload)));
  var url=location.origin+location.pathname+'?r='+encodeURIComponent(encoded);
  if(navigator.share){navigator.share({title:'나의 성생활 능력치 결과',text:window._rName+' — '+window._rTag,url:url}).catch(function(){copyToClip(url);});}
  else{copyToClip(url);}
}
function copyToClip(txt){
  if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt).then(function(){alert('공유 링크가 복사되었어요!\n친구에게 보내보세요.');});}
  else{var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('공유 링크가 복사되었어요!\n친구에게 보내보세요.');}
}
function retry(){
  GD='';AGE='';QS=[];ci=0;ANS={};
  document.querySelectorAll('.g-btn').forEach(function(b){b.classList.remove('sel');});
  document.getElementById('ageSelect').selectedIndex=0;
  go('intro');window.scrollTo(0,0);loadCounter();
}
function checkShared(){
  var params=new URLSearchParams(location.search);var r=params.get('r');if(!r)return false;
  try{var json=decodeURIComponent(escape(atob(decodeURIComponent(r))));var d=JSON.parse(json);
    var sc=d.s;var avg=d.a;var tier=d.t;var nm=NM[tier];var pc=pctl(avg);
    var sorted=SK.slice().sort(function(a,b){return sc[b]-sc[a];});
    var strongest=sorted[0],weakest=sorted[sorted.length-1];
    var h=buildResultHTML(sc,avg,tier,nm,pc,sorted,strongest,weakest,true);
    document.getElementById('sharedInner').innerHTML=h;
    document.querySelectorAll('section').forEach(function(s){s.classList.remove('active');});
    document.getElementById('shared-result').classList.add('active');
    setTimeout(function(){drawRing('ringCvS',avg);},100);
    setTimeout(function(){drawH('hexCvS',sc);},200);
    return true;
  }catch(e){return false;}
}
(function(){if(!checkShared()){loadCounter();}})();
</script>
